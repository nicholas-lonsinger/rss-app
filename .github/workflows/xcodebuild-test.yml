name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode
        run: |
          # Prefer Xcode 26; fall back to the latest available version
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          else
            echo "::warning::Xcode 26 not found, using default Xcode"
          fi
          xcodebuild -version

      - name: Resolve simulator destination
        id: sim
        run: |
          # List available iPhone simulators and pick the first one.
          # Avoids hardcoding a device name that may not exist on all runner images.
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name']:
                      print(d['name'])
                      sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$DEST" ]; then
            echo "::error::No iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "dest=platform=iOS Simulator,name=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEST"

          # Ensure the simulator is booted — xcodebuild sometimes fails to find
          # available-but-shutdown simulators on CI runners.
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          name = '$DEST'
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d['name'] == name:
                      print(d['udid'])
                      sys.exit(0)
          " || true)
          if [ -n "$UDID" ]; then
            echo "Booting simulator $UDID..."
            xcrun simctl boot "$UDID" 2>/dev/null || true
          fi

      - name: Build for testing
        env:
          SIM_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project RSSApp.xcodeproj \
            -scheme RSSApp \
            -destination "$SIM_DEST" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      - name: Test without building
        env:
          SIM_DEST: ${{ steps.sim.outputs.dest }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project RSSApp.xcodeproj \
            -scheme RSSApp \
            -destination "$SIM_DEST" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
