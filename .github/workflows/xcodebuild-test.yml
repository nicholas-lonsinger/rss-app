name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve simulator
        id: sim
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available
          DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runtimes = sorted((k, v) for k, v in data['devices'].items() if 'iOS' in k)
          for name, devices in reversed(runtimes):
              for d in devices:
                  if 'iPhone' in d['name']:
                      print(d['name']); sys.exit(0)
          sys.exit(1)")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using device: $DEVICE"

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project RSSApp.xcodeproj \
            -scheme RSSApp \
            -destination 'platform=iOS Simulator,OS=latest,name=${{ steps.sim.outputs.device }}' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      - name: Test without building
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project RSSApp.xcodeproj \
            -scheme RSSApp \
            -destination 'platform=iOS Simulator,OS=latest,name=${{ steps.sim.outputs.device }}' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
